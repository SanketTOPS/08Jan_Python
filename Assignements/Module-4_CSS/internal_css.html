<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal CSS</title>
    <!-- Internal CSS -->
    <style>
        body {
            background-color: azure;
        }

        h1 {
            text-align: center;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: blue;
            border-style: groove;
            border-radius: 15px;
        }

        .mycls {
            text-align: right;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: rgb(222, 89, 31);
            border-style: dotted;
            border-radius: 15px;
        }
    </style>
</head>

<body>
    <h1>Welcome to Internal CSS</h1>

    <h1 class="mycls">This is Demo CSS</h1>
</body>

</html>
