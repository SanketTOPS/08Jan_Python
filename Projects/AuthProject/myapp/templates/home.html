<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
        }

        /* Navbar */
        .navbar {
            background: #111;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .navbar h1 {
            font-size: 20px;
        }

        .logout-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .logout-btn:hover {
            background: #ccc;
        }

        /* Main Content */
        .container {
            padding: 20px;
        }

        .welcome {
            margin-bottom: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .card:hover {
            border-color: #fff;
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            font-size: 14px;
            color: #ccc;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .navbar h1 {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h1>My Dashboard</h1>
        <a href="/userlogout" class="logout-btn">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="welcome">
            <h2>Welcome, {{user}} 👋</h2>
            <p>You have successfully logged in.</p>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Profile</h3>
                <p>View and update your personal details.</p>
            </div>

            <div class="card">
                <h3>Settings</h3>
                <p>Manage your account settings and preferences.</p>
            </div>

            <div class="card">
                <h3>Messages</h3>
                <p>Check your latest notifications and messages.</p>
            </div>

            <div class="card">
                <h3>Tasks</h3>
                <p>Track your daily tasks and progress.</p>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            alert("Logged out successfully!");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
