{% extends 'base.html' %}

{% block title %}Forgot Password - NotesApp{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-[40px] shadow-2xl border border-gray-100 p-10 animate-in fade-in zoom-in duration-500">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-black text-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2">Forgot Password?</h1>
            <p class="text-gray-500 text-sm">Enter your email and we'll send you an OTP to reset your password.</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-2">
                <label class="text-sm font-bold text-gray-700 ml-1">Email Address</label>
                <input type="email" name="email" required class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-black outline-none transition" placeholder="Enter your registered email">
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full gradient-btn text-white font-bold py-4 rounded-2xl shadow-xl hover:shadow-black/20 transition text-lg">
                    Send Reset OTP
                </button>
            </div>
        </form>

        <div class="mt-8 text-center">
            <a href="{% url 'login' %}" class="text-sm font-bold text-gray-400 hover:text-black transition">Wait, I remember my password!</a>
        </div>
    </div>
</div>
{% endblock %}
