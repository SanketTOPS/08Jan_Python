{% extends 'base.html' %}

{% block title %}Set New Password - NotesApp{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-[40px] shadow-2xl border border-gray-100 p-10 animate-in fade-in zoom-in duration-500">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-black text-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2">Set New Password</h1>
            <p class="text-gray-500 text-sm">Create a strong password to protect your account.</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-sm font-bold text-gray-700 ml-1">New Password</label>
                    <input type="password" name="password" required class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-black outline-none transition" placeholder="••••••••">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-gray-700 ml-1">Confirm New Password</label>
                    <input type="password" name="confirm_password" required class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-black outline-none transition" placeholder="••••••••">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full gradient-btn text-white font-bold py-4 rounded-2xl shadow-xl hover:shadow-black/20 transition text-lg">
                    Reset Password
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
