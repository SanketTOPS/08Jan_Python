{% extends 'core/base.html' %}

{% block content %}
<header class="flex justify-between items-center mb-12">
    <div>
        <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">
            NexTask
        </h1>
        <p class="text-slate-400 mt-2">Manage your flow with elegance</p>
    </div>
    <div id="loader" class="htmx-indicator">
        <svg class="animate-spin h-6 w-6 text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
    </div>
</header>

<!-- Add Task Section -->
<div class="glass-card p-6 mb-8">
    <form hx-post="{% url 'task_create' %}" 
          hx-target="#task-list" 
          hx-swap="afterbegin" 
          hx-on::after-request="this.reset()"
          hx-indicator="#loader"
          class="flex flex-col md:flex-row gap-4">
        <div class="flex-grow">
            <input type="text" name="title" placeholder="What needs to be done?" required
                   class="glass-input w-full px-6 py-4 rounded-xl text-lg font-medium">
        </div>
        <div class="md:w-1/3">
            <input type="text" name="description" placeholder="Optional details..."
                   class="glass-input w-full px-6 py-4 rounded-xl">
        </div>
        <button type="submit" class="btn-primary px-8 py-4 rounded-xl font-bold text-white whitespace-nowrap">
            Add Task
        </button>
    </form>
</div>

<!-- Task List -->
<div id="task-list" class="space-y-4">
    {% for task in tasks %}
        {% include 'core/task_item.html' %}
    {% empty %}
        <div id="empty-state" class="text-center py-20 text-slate-500">
            <svg class="w-16 h-16 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
            </svg>
            <p class="text-xl">Your task list is empty. Start by adding one!</p>
        </div>
    {% endfor %}
</div>
{% endblock %}
