<div id="task-{{ task.id }}" class="task-item glass-card p-5 group flex items-center gap-4 {% if task.completed %}opacity-60{% endif %}">
    <!-- Toggle Button -->
    <button hx-post="{% url 'task_toggle' task.id %}" 
            hx-target="#task-{{ task.id }}" 
            hx-swap="outerHTML"
            class="relative flex-shrink-0 w-8 h-8 rounded-full border-2 border-indigo-500/50 flex items-center justify-center transition-all hover:border-indigo-400 group-hover:scale-110">
        {% if task.completed %}
            <div class="w-4 h-4 bg-indigo-500 rounded-full animate-pulse"></div>
            <svg class="absolute w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
        {% endif %}
    </button>

    <!-- Content -->
    <div class="flex-grow">
        <h3 class="font-semibold text-lg transition-all {% if task.completed %}line-through text-slate-500{% else %}text-white{% endif %}">
            {{ task.title }}
        </h3>
        {% if task.description %}
            <p class="text-sm text-slate-400 group-hover:text-slate-300 transition-colors">
                {{ task.description }}
            </p>
        {% endif %}
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
        <button hx-get="{% url 'task_edit_form' task.id %}"
                hx-target="#task-{{ task.id }}"
                class="p-2 hover:bg-white/10 rounded-lg text-slate-400 hover:text-indigo-400 transition-colors"
                title="Edit Task">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
            </svg>
        </button>
        <button hx-delete="{% url 'task_delete' task.id %}"
                hx-target="#task-{{ task.id }}"
                hx-swap="outerHTML"
                hx-confirm="Are you sure you want to delete this task?"
                class="p-2 hover:bg-red-500/10 rounded-lg text-slate-400 hover:text-red-400 transition-colors"
                title="Delete Task">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
            </svg>
        </button>
    </div>
</div>
