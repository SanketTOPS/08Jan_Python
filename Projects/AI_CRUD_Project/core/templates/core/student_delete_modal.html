<div class="glass-card p-8 border-red-500/30">
    <div class="flex items-center justify-center w-16 h-16 mx-auto mb-6 bg-red-500/10 rounded-full">
        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
    </div>
    
    <h2 class="text-2xl font-bold text-center text-white mb-2">Delete Record?</h2>
    <p class="text-center text-slate-400 mb-8">
        Are you sure you want to delete <span class="font-bold text-slate-200">{{ student.name }}</span>? This action cannot be undone.
    </p>

    <div class="flex gap-4">
        <button onclick="closeModal()" 
                class="flex-1 px-6 py-3 bg-white/10 hover:bg-white/20 rounded-xl font-bold transition-all">
            Cancel
        </button>
        <button hx-delete="{% url 'student_delete' student.id %}"
                hx-target="#student-{{ student.id }}"
                hx-swap="outerHTML"
                hx-on::after-request="closeModal()"
                class="flex-1 px-6 py-3 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold shadow-lg shadow-red-600/20 transition-all">
            Delete Now
        </button>
    </div>
</div>
