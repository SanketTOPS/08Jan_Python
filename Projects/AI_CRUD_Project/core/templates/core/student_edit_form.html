<div id="student-{{ student.id }}" class="glass-card p-6 border-indigo-500/30">
    <form hx-post="{% url 'student_update' student.id %}" 
          hx-target="#student-{{ student.id }}" 
          hx-swap="outerHTML"
          class="space-y-4">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-1">
                <label class="text-xs text-slate-400">Student ID</label>
                <input type="text" name="student_id" value="{{ student.student_id }}" required
                       class="glass-input w-full px-4 py-2 rounded-lg text-sm">
            </div>
            <div class="space-y-1">
                <label class="text-xs text-slate-400">Name</label>
                <input type="text" name="name" value="{{ student.name }}" required
                       class="glass-input w-full px-4 py-2 rounded-lg text-sm">
            </div>
            <div class="space-y-1">
                <label class="text-xs text-slate-400">Subject</label>
                <select name="subject" class="glass-input w-full px-4 py-2 rounded-lg text-sm">
                    {% for subject in subjects %}
                        <option value="{{ subject.id }}" {% if student.subject.id == subject.id %}selected{% endif %} class="bg-indigo-950">
                            {{ subject.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="space-y-1">
                <label class="text-xs text-slate-400">Email</label>
                <input type="email" name="email" value="{{ student.email }}" required
                       class="glass-input w-full px-4 py-2 rounded-lg text-sm">
            </div>
            <div class="space-y-1">
                <label class="text-xs text-slate-400">DOB</label>
                <input type="date" name="dob" value="{{ student.dob|date:'Y-m-d' }}" required
                       class="glass-input w-full px-4 py-2 rounded-lg text-sm">
            </div>
        </div>

        <div class="flex gap-2 justify-end pt-2">
            <button type="submit" class="btn-primary px-6 py-2 rounded-lg text-sm font-bold">
                Update Record
            </button>
            <button hx-get="{% url 'student_list' %}"
                    hx-target="body"
                    class="px-6 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm font-bold transition-all">
                Cancel
            </button>
        </div>
    </form>
</div>
